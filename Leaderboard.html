<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leveling Nexus — Leaderboard</title>
  
  <link rel="manifest" href="/LEVELING-NEXUS/manifest.json" />
<meta name="theme-color" content="#000000" />

  
<!-- =====================================================
     LEVELING NEXUS — PWA Meta Tags (add to ALL HTML pages)
     Place inside <head> of Login.html and every other page
     ===================================================== -->

<!-- Core PWA / Standalone mode -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXUS">

<!-- Suppress browser chrome & loading bar -->
<meta name="theme-color" content="#000000">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="msapplication-starturl" content="/LEVELING-NEXUS/Login.html">

<!-- Splash screens (iOS — optional but prevents white flash) -->
<link rel="apple-touch-icon" href="/LEVELING-NEXUS/AppIcon.png">
<link rel="apple-touch-startup-image" href="/LEVELING-NEXUS/AppIcon.png">

<!-- Manifest -->
<link rel="manifest" href="/LEVELING-NEXUS/manifest.json">

<!-- =====================================================
     INLINE STYLE — also add this inside <style> or a
     linked CSS file to kill any residual white flash
     ===================================================== -->
<style>
  /* Prevent white flash on page load in standalone PWA */
  html, body {
    background-color: #000000 !important;
    margin: 0;
    padding: 0;
  }
</style>
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <script type="module" src="x-main.js"></script>
  <script type="module" src="y-connectionError.js"></script>
  <script type="module" src="y-leaderboard.js"></script>


</head>

<body class="leaderboard">
  <div class="container">
    <header>
      <div>
        <div class="logo">LEVELING NEXUS</div>
        <div class="subtitle">Gamified habit tracker — complete quests to gain XP & stats</div>
      </div>

      <div class="nav-buttons">
        <!-- LIVE CLOCK -->
      <div class="header-clock">
        <div class="clock-time" id="clock-time">--<span class="clock-colon">:</span>-- --</div>
        <div class="clock-date" id="clock-date">--- --, ----</div>
      </div>

        <div class="all-nav">
        <button class="nav-btn" onclick="toHome()">Home</button>
        <button class="nav-btn" onclick="toQuest()">Quest</button>
        <button class="nav-btn active">Leaderboard</button>
        <button class="nav-btn" onclick="toProfile()">Profile</button>
      </div>

      </div>
    </header>

    <main>
      <div class="card">
        <div class="section-title">Leaderboard</div>

        <div class="leaderboard-list" id="leaderboard-list">
          
          </div>
          <div class="leaderboard-placeholder" id="leaderboard-placeholder"></div>
      </div> 
          <!-- Your Current Rank Section -->
<div class="your-current-rank">
  <div class="section-title">Your Current Rank</div>
  <div class="current-rank-info">
    <div class="rank">#NULL</div> <!-- Placeholder for current rank -->
    <div class="name">Player Name</div> <!-- Placeholder for player name -->
    <div class="class">Class: NULL, Level: NULL</div> <!-- Placeholder for XP -->
  </div>
</div>

      </div>
    </main>

    <footer></footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
